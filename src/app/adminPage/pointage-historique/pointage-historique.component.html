<div class="p-6 bg-white rounded shadow">

  <!-- Filtres -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">

    <input type="text" placeholder="Recherche nom, prénom, site..." [(ngModel)]="search" (input)="onSearchChange()"
      class="border p-2 rounded w-full" />

    <input type="date" [(ngModel)]="dateDebut" (change)="onDateChange()" class="border p-2 rounded w-full" />

    <input type="date" [(ngModel)]="dateFin" (change)="onDateChange()" class="border p-2 rounded w-full" />

    <button (click)="resetFilters()" class="bg-gray-500 text-white px-3 py-2 rounded">
      Reset
    </button>

    <div class="flex gap-2">
      <button (click)="exportExcel()" class="bg-green-600 text-white px-3 py-2 rounded">
        Excel
      </button>
      <button (click)="exportPdf()" class="bg-red-600 text-white px-3 py-2 rounded">
        PDF
      </button>
    </div>
  </div>

  <!-- Table -->
  <table class="w-full border text-sm">
    <thead class="bg-gray-100">
      <tr>
        <th class="p-2">Date</th>
         <th class="p-2">Prénom</th>
        <th class="p-2">Nom</th>
        <th class="p-2">Arrivée</th>
        <th class="p-2">Départ</th>
        <th class="p-2">Durée</th>
        <th class="p-2">Site</th>
        <th class="p-2">Localisation</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of pointages; trackBy: trackById" class="border-r text-center">
        <td class="p-2">{{ p.date | date:'dd/MM/yyyy' }}</td>
         <td class="p-2">{{ p.prenom }}</td>
        <td class="p-2">{{ p.nom }}</td>
        <td class="p-2">{{ p.heureArrive }}</td>
        <td class="p-2">{{ p.heureDepart }}</td>
        <td class="p-2">{{ p.duree }}</td>
        <td class="p-2">{{ p.site.join(', ') }}</td>
        <td class="p-2">{{ p.adresse }}</td>
      </tr>
    </tbody>
  </table>

  <!-- Pagination -->
  <div class="flex justify-between items-center mt-4">
    <button (click)="changePage(page - 1)" [disabled]="page === 0" class="px-3 py-1 border rounded">
      ◀
    </button>

    <span>Page {{ page + 1 }} / {{ totalPages }}</span>

    <button (click)="changePage(page + 1)" [disabled]="page + 1 >= totalPages" class="px-3 py-1 border rounded">
      ▶
    </button>
  </div>

</div>
