<div class="p-4 sm:p-6 max-w-5xl mx-auto">

  <!-- En-tête -->
  <div class="flex items-center gap-3 mb-6">
    <a routerLink="/admin/stock-v2/controle-mouvements/bons-entree"
      class="p-2 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition-colors">
      <lucide-icon name="ArrowLeft" [size]="20"></lucide-icon>
    </a>
    <div class="flex items-center gap-3">
      <div class="p-2.5 rounded-xl bg-emerald-100 text-emerald-700">
        <lucide-icon name="FileInput" [size]="22"></lucide-icon>
      </div>
      <div>
        <h1 class="text-xl font-bold text-gray-800">{{ idEdition ? 'Modifier le bon d\'entrée' : 'Nouveau bon d\'entrée' }}</h1>
        <p class="text-sm text-gray-500">Le numéro est attribué automatiquement à la création.</p>
      </div>
    </div>
  </div>

  @if (chargement) {
    <div class="space-y-4">
      <div class="h-40 rounded-xl bg-gray-100 animate-pulse"></div>
      <div class="h-40 rounded-xl bg-gray-100 animate-pulse"></div>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="enregistrer()" class="space-y-6">

      <!-- Infos générales -->
      <div class="bg-white rounded-xl border border-gray-100 p-5">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">Informations générales</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Type d'entrée <span class="text-red-500">*</span></label>
            <select formControlName="type"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400">
              @for (t of TYPES; track t) { <option [value]="t">{{ LIBELLES_TYPE_ENTREE[t] }}</option> }
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Date <span class="text-red-500">*</span></label>
            <input type="date" formControlName="date"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Site destination <span class="text-red-500">*</span></label>
            <app-selecteur-site formControlName="siteDestinationId"></app-selecteur-site>
            @if (f['siteDestinationId'].touched && f['siteDestinationId'].invalid) {
              <p class="text-xs text-red-600 mt-1">Site requis.</p>
            }
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Fournisseur / source</label>
            <input type="text" formControlName="fournisseur" placeholder="Nom du fournisseur ou origine"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Référence commande</label>
            <input type="text" formControlName="referenceCommande" placeholder="N° de commande / BL"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Demandeur</label>
            <app-selecteur-employe formControlName="demandeurId"></app-selecteur-employe>
          </div>
        </div>
      </div>

      <!-- Lignes produits -->
      <div class="bg-white rounded-xl border border-gray-100 p-5">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">Produits du bon</h2>
        <app-editeur-lignes-bon [lignes]="lignes"></app-editeur-lignes-bon>
      </div>

      <!-- Commentaire -->
      <div class="bg-white rounded-xl border border-gray-100 p-5">
        <label class="block text-xs font-semibold text-gray-500 mb-1">Commentaire</label>
        <textarea formControlName="commentaire" rows="2" placeholder="Note libre (optionnel)"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400"></textarea>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3">
        <button type="button" (click)="annuler()"
          class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
          Annuler
        </button>
        <button type="submit" [disabled]="submitting"
          class="inline-flex items-center gap-2 px-5 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 transition-colors">
          @if (submitting) { <lucide-icon name="Loader2" [size]="16" class="animate-spin"></lucide-icon> }
          @else { <lucide-icon name="Save" [size]="16"></lucide-icon> }
          Enregistrer le brouillon
        </button>
      </div>
    </form>
  }
</div>
