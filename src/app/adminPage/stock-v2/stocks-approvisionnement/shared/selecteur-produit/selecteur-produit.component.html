<div class="relative">
  <div class="relative">
    <lucide-icon name="PackageSearch" [size]="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></lucide-icon>
    <input
      type="text"
      [formControl]="recherche"
      (blur)="onBlur()"
      (focus)="afficherDropdown = resultats.length > 0"
      [placeholder]="placeholder"
      class="w-full pl-9 pr-9 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400">
    @if (produitCourant) {
      <button type="button" (click)="effacer()" title="Effacer"
        class="absolute right-2 top-1/2 -translate-y-1/2 p-1 rounded text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors">
        <lucide-icon name="X" [size]="14"></lucide-icon>
      </button>
    } @else if (chargement) {
      <lucide-icon name="Loader2" [size]="16" class="absolute right-3 top-1/2 -translate-y-1/2 text-indigo-400 animate-spin"></lucide-icon>
    }
  </div>

  @if (afficherDropdown && resultats.length > 0) {
    <ul class="absolute z-20 mt-1 w-full max-h-64 overflow-auto rounded-lg border border-gray-200 bg-white shadow-lg">
      @for (p of resultats; track trackById($index, p)) {
        <li
          (mousedown)="selectionner(p)"
          class="px-3 py-2 text-sm cursor-pointer hover:bg-indigo-50 flex items-center justify-between gap-2">
          <span class="min-w-0">
            <span class="font-mono text-xs text-gray-500">{{ p.code }}</span>
            <span class="text-gray-800 ml-2">{{ p.libelle }}</span>
          </span>
          <span class="text-xs text-gray-400 shrink-0">{{ LIBELLES_UNITE[p.unite] }}</span>
        </li>
      }
    </ul>
  }
</div>
