<div class="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8">
  <div class="max-w-2xl mx-auto">

    <div class="mb-6">
      <a routerLink="/admin/stock-v2/stocks-approvisionnement/mouvements"
        class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-indigo-600 transition-colors mb-2">
        <lucide-icon name="ArrowLeft" [size]="16"></lucide-icon>
        Retour aux mouvements
      </a>
      <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
        <lucide-icon name="ArrowLeftRight" [size]="24" class="text-indigo-600"></lucide-icon>
        Nouveau mouvement
      </h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="enregistrer()"
      class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-5">

      <!-- Type (segmented) -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-2">Type de mouvement</label>
        <div class="grid grid-cols-2 gap-2">
          @for (t of TYPES; track t) {
            <button type="button" (click)="form.get('type')!.setValue(t)"
              class="flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl border text-sm font-medium transition-colors"
              [class.bg-indigo-600]="type === t" [class.text-white]="type === t" [class.border-indigo-600]="type === t"
              [class.bg-white]="type !== t" [class.text-gray-600]="type !== t" [class.border-gray-200]="type !== t">
              @if (t === 'ENTREE') { <lucide-icon name="PackagePlus" [size]="16"></lucide-icon> }
              @else { <lucide-icon name="PackageMinus" [size]="16"></lucide-icon> }
              {{ LIBELLES_TYPE_MOUVEMENT[t] }}
            </button>
          }
        </div>
      </div>

      <!-- Produit -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Produit <span class="text-red-500">*</span></label>
        <app-selecteur-produit formControlName="produitId" (produitSelectionne)="onProduitSelectionne($event)"></app-selecteur-produit>
        @if (f['produitId'].touched && f['produitId'].invalid) {
          <p class="text-xs text-red-500 mt-1">Sélectionnez un produit.</p>
        }
      </div>

      <!-- Motif + Quantité -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Motif <span class="text-red-500">*</span></label>
          <select formControlName="motif"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
            @for (m of motifsDisponibles; track m) {
              <option [value]="m">{{ LIBELLES_MOTIF_MOUVEMENT[m] }}</option>
            }
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">
            Quantité <span class="text-red-500">*</span>
            @if (produitCourant) { <span class="text-gray-400 font-normal">({{ LIBELLES_UNITE[produitCourant.unite] }})</span> }
          </label>
          <input type="number" min="0" step="any" formControlName="quantite"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
          @if (f['quantite'].touched && f['quantite'].invalid) {
            <p class="text-xs text-red-500 mt-1">Quantité strictement positive requise.</p>
          }
        </div>
      </div>

      <!-- Date + commentaire -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Date <span class="text-red-500">*</span></label>
          <input type="date" formControlName="date"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Commentaire</label>
        <textarea formControlName="commentaire" rows="2"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30"></textarea>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 pt-2">
        <a routerLink="/admin/stock-v2/stocks-approvisionnement/mouvements"
          class="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-700 bg-white border border-gray-200 hover:bg-gray-100 transition-colors">
          Annuler
        </a>
        <button type="submit" [disabled]="submitting"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 transition-colors shadow-sm">
          @if (submitting) { <lucide-icon name="Loader2" [size]="16" class="animate-spin"></lucide-icon> }
          @else { <lucide-icon name="Save" [size]="16"></lucide-icon> }
          Enregistrer
        </button>
      </div>
    </form>
  </div>
</div>
