<div class="min-h-screen bg-gray-50 p-6">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">{{ isEditMode ? 'Modifier le besoin' : 'Nouveau besoin de formation' }}</h1>
  </div>

  <div *ngIf="loading" class="p-8 text-center text-gray-500">
    <lucide-icon name="Loader" class="w-6 h-6 animate-spin inline"></lucide-icon>
  </div>

  <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="enregistrer()" class="space-y-6">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">Informations du besoin</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-gray-600 uppercase mb-1">Employé *</label>
          <select formControlName="employeId" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">-- Sélectionner un employé --</option>
            <option *ngFor="let e of employes" [value]="e.id">{{ e.nom }} {{ e.prenom }} ({{ e.matricule }})</option>
          </select>
          <p *ngIf="form.get('employeId')?.touched && form.get('employeId')?.invalid" class="text-red-500 text-xs mt-1">Employé requis</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 uppercase mb-1">Département *</label>
          <input type="text" formControlName="departement" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50" readonly />
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-gray-600 uppercase mb-1">Compétence lacune *</label>
          <textarea formControlName="competenceLacune" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
            placeholder="Décrivez la compétence manquante..."></textarea>
          <p *ngIf="form.get('competenceLacune')?.touched && form.get('competenceLacune')?.invalid" class="text-red-500 text-xs mt-1">Champ requis</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 uppercase mb-1">Priorité *</label>
          <select formControlName="priorite" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="HAUTE">Haute</option>
            <option value="MOYENNE">Moyenne</option>
            <option value="BASSE">Basse</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 uppercase mb-1">Source *</label>
          <select formControlName="source" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="EVALUATION">Évaluation périodique</option>
            <option value="MANAGER">Manager</option>
            <option value="EMPLOYE">Employé</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 uppercase mb-1">Statut *</label>
          <select formControlName="statut" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="IDENTIFIE">Identifié</option>
            <option value="PLANIFIE">Planifié</option>
            <option value="REALISE">Réalisé</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 uppercase mb-1">Formation suggérée</label>
          <select formControlName="formationSuggereId" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">-- Aucune --</option>
            <option *ngFor="let f of formations" [value]="f.id">{{ f.titre }}</option>
          </select>
        </div>
      </div>
    </div>

    <div class="flex gap-3">
      <button type="submit" [disabled]="saving"
        class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg shadow font-medium disabled:opacity-50">
        <lucide-icon name="Save" class="w-5 h-5"></lucide-icon>
        {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
      <button type="button" (click)="annuler()" class="inline-flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2.5 rounded-lg font-medium">Annuler</button>
    </div>
  </form>
</div>
