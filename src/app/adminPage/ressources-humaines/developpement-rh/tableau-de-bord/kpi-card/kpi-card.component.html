<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center gap-4">
  <div class="w-12 h-12 rounded-lg flex items-center justify-center bg-gray-50" [ngClass]="iconColor">
    <lucide-icon [name]="icon" class="w-6 h-6"></lucide-icon>
  </div>
  <div class="flex-1">
    <p class="text-2xl font-bold text-gray-800">{{ value }}</p>
    <p class="text-xs text-gray-500 uppercase mt-0.5">{{ label }}</p>
  </div>
  <div *ngIf="trend" class="flex items-center">
    <lucide-icon *ngIf="trend === 'up'" name="TrendingUp" class="w-5 h-5 text-green-500"></lucide-icon>
    <lucide-icon *ngIf="trend === 'down'" name="TrendingDown" class="w-5 h-5 text-red-500"></lucide-icon>
    <lucide-icon *ngIf="trend === 'stable'" name="Minus" class="w-5 h-5 text-gray-400"></lucide-icon>
  </div>
</div>
