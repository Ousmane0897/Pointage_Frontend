<div class="min-h-screen bg-gray-50 p-6">

  <div class="flex items-center gap-3 mb-6">
    <button (click)="annuler()" class="p-2 rounded-lg hover:bg-gray-100 text-gray-600">
      <lucide-icon name="ArrowLeft" class="w-5 h-5"></lucide-icon>
    </button>
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Déclarer des heures supplémentaires</h1>
      <p class="text-sm text-gray-500 mt-1">La déclaration sera soumise à la validation du responsable</p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="soumettre()" novalidate
    class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-3xl">

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">

      <div class="sm:col-span-2">
        <label class="block text-xs font-medium text-gray-600 uppercase mb-1">
          Employé <span class="text-red-500">*</span>
        </label>
        <select formControlName="employeId"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-white">
          <option value="">-- Sélectionner --</option>
          <option *ngFor="let e of employes" [value]="e.id">
            {{ e.matricule }} — {{ e.prenom }} {{ e.nom }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 uppercase mb-1">
          Date <span class="text-red-500">*</span>
        </label>
        <input type="date" formControlName="date"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm" />
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 uppercase mb-1">
          Type de majoration <span class="text-red-500">*</span>
        </label>
        <select formControlName="typeMajoration"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-white">
          <option value="T_15">+15 % — Semaine (≤ 8h sup)</option>
          <option value="T_40">+40 % — Semaine (&gt; 8h sup)</option>
          <option value="T_60">+60 % — Dimanche / férié</option>
          <option value="T_100">+100 % — Heures de nuit</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 uppercase mb-1">
          Heure de début <span class="text-red-500">*</span>
        </label>
        <input type="time" formControlName="heureDebut"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm" />
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 uppercase mb-1">
          Heure de fin <span class="text-red-500">*</span>
        </label>
        <input type="time" formControlName="heureFin"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm" />
      </div>

      <div class="sm:col-span-2">
        <label class="block text-xs font-medium text-gray-600 uppercase mb-1">Motif</label>
        <textarea formControlName="motif" rows="3"
          placeholder="Raison des heures supplémentaires..."
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm"></textarea>
      </div>
    </div>

    <!-- Prévisualisation du calcul -->
    <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-4 mb-5">
      <div class="text-xs text-indigo-700 uppercase tracking-wide mb-2 font-medium">
        Calcul automatique
      </div>
      <div class="grid grid-cols-3 gap-4 text-sm">
        <div>
          <div class="text-xs text-gray-500">Heures déclarées</div>
          <div class="text-xl font-bold text-gray-800">{{ nombreHeuresCalcule }} h</div>
        </div>
        <div>
          <div class="text-xs text-gray-500">Taux appliqué</div>
          <div class="text-xl font-bold text-indigo-700">+{{ tauxActuel }} %</div>
        </div>
        <div>
          <div class="text-xs text-gray-500">Équivalent majoré</div>
          <div class="text-xl font-bold text-green-700">{{ heuresMajoreesCalculees }} h</div>
        </div>
      </div>
    </div>

    <div class="flex gap-3 justify-end pt-4 border-t border-gray-100">
      <button type="button" (click)="annuler()"
        class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 text-sm font-medium">
        Annuler
      </button>
      <button type="submit" [disabled]="submitting"
        class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium disabled:opacity-60">
        <lucide-icon [name]="submitting ? 'Loader' : 'Send'" [class.animate-spin]="submitting" class="w-4 h-4"></lucide-icon>
        Déclarer
      </button>
    </div>
  </form>
</div>
